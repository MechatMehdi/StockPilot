name: Build & Release StockPilot

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
      
      - name: Find project root
        id: find_root
        run: |
          if (Test-Path "gl_project\pom.xml") {
            Write-Host "Project found in gl_project subdirectory"
            echo "projectDir=gl_project" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Project found in repository root"
            echo "projectDir=." >> $env:GITHUB_OUTPUT
          }
      
      - name: Build with Maven
        run: |
          $projectDir = "${{ steps.find_root.outputs.projectDir }}"
          Write-Host "Building from: $projectDir"
          
          if ($projectDir -ne ".") {
            Push-Location $projectDir
          }
          
          .\mvnw.cmd clean package -DskipTests -X
          $buildStatus = $LASTEXITCODE
          
          if ($projectDir -ne ".") {
            Pop-Location
          }
          
          if ($buildStatus -ne 0) {
            Write-Error "Maven build failed with exit code $buildStatus"
            exit $buildStatus
          }
      
      - name: Find and Package JAR
        run: |
          $projectDir = "${{ steps.find_root.outputs.projectDir }}"
          $targetDir = Join-Path $projectDir "target"
          
          Write-Host "Target directory: $targetDir"
          Write-Host "Directory exists: $(Test-Path $targetDir)"
          
          if (Test-Path $targetDir) {
            Write-Host "Files in target:"
            Get-ChildItem $targetDir -File | ForEach-Object { Write-Host "  - $($_.Name)" }
          }
          
          $jarFile = Get-ChildItem "$targetDir\*.jar" -ErrorAction SilentlyContinue | 
                     Where-Object { $_.Name -notlike "*original*" } | 
                     Select-Object -First 1
          
          if (-not $jarFile) {
            Write-Error "No JAR file found in $targetDir"
            exit 1
          }
          
          Write-Host "Found JAR: $($jarFile.Name)"
          
          $distDir = Join-Path $targetDir "dist"
          if (-not (Test-Path $distDir)) { 
            New-Item -ItemType Directory -Path $distDir -Force | Out-Null
          }
          
          Write-Host "Creating MSI installer..."
          jpackage `
            --input "$targetDir" `
            --name StockPilot `
            --main-jar "$($jarFile.Name)" `
            --main-class application.main.AppLauncher `
            --type msi `
            --dest "$distDir" `
            --app-version 1.0 `
            --vendor "StockPilot" `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "MSI created successfully"
            Get-ChildItem "$distDir\*.msi" | ForEach-Object { Write-Host "  - $($_.Name)" }
          } else {
            Write-Error "jpackage failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
      
      - name: Find MSI files
        id: msi
        run: |
          $projectDir = "${{ steps.find_root.outputs.projectDir }}"
          $targetDir = Join-Path $projectDir "target"

          $msiFiles = @(Get-ChildItem -Path $targetDir -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue)

          if ($msiFiles.Count -eq 0) {
            Write-Host "No MSI files found in $targetDir"
            Write-Host "Directory structure:"
            Get-ChildItem -Path $targetDir -Recurse | Select-Object FullName
            echo "msiPath=" >> $env:GITHUB_OUTPUT
            echo "msiName=" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Found $($msiFiles.Count) MSI file(s):"
            $msiFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
            $first = $msiFiles[0]
            echo "msiPath=$($first.FullName)" >> $env:GITHUB_OUTPUT
            echo "msiName=$($first.Name)" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        id: upload_asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.msi.outputs.msiPath }}
          asset_name: ${{ steps.msi.outputs.msiName }}
          asset_content_type: application/x-msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}